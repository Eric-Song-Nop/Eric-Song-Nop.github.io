name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout gocire
        uses: actions/checkout@v4
        with:
          repository: Eric-Song-Nop/gocire
          ref: master
          path: gocire

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gocire/go.mod

      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.1
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck content
        run: pnpm run typecheck

      - name: Build website
        run: pnpm run build
        env:
          GOCIRE_DIR: ${{ github.workspace }}/gocire

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .gocire/site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
